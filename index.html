<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>DIGIY MARKET — Accueil commerçant</title>
  <meta name="description" content="Accueil simple DIGIY MARKET : produits, boutique, QR et partage WhatsApp."/>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet"/>
  <meta name="theme-color" content="#063b2b"/>
  <meta name="digiy-build" content="market-simple-hub-v4-audit-20260722"/>

  <script>
    window.DIGIY_LOGIN_URL = "./pin.html";
    window.DIGIY_MODULE = "MARKET";
    window.DIGIY_ABOS_MODULE = "MARKET";
    window.DIGIY_MODULE_LABEL = "Je vends";
    document.documentElement.style.visibility = "hidden";
  </script>
  <script src="./guard.js?v=market-guard-20260722" onerror="location.replace('./pin.html?reason=guard_missing')"></script>

  <style>
    :root{
      color-scheme:light;
      --bg:#efe3cc;
      --bg2:#fff8ea;
      --card:rgba(255,250,240,.94);
      --line:rgba(16,37,28,.14);
      --text:#10251c;
      --green:#22c55e;
      --green-dark:#063b2b;
      --gold:#f4cf64;
      --shadow:0 22px 65px rgba(6,59,43,.18);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:22px;
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(800px 470px at 8% -10%,rgba(34,197,94,.18),transparent 60%),
        radial-gradient(720px 430px at 108% 4%,rgba(244,207,100,.30),transparent 56%),
        linear-gradient(180deg,var(--bg2),var(--bg));
    }

    main{
      width:min(480px,100%);
      padding:24px;
      border:1px solid var(--line);
      border-radius:28px;
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    h1{
      margin:0 0 22px;
      color:var(--green-dark);
      font-size:clamp(2rem,9vw,3rem);
      line-height:1.02;
      letter-spacing:-.045em;
    }

    nav{
      display:grid;
      gap:12px;
    }

    a,button{
      width:100%;
      min-height:62px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px 18px;
      border:1px solid var(--line);
      border-radius:18px;
      color:var(--text);
      background:rgba(255,255,255,.78);
      font:inherit;
      font-size:1rem;
      font-weight:900;
      text-align:center;
      text-decoration:none;
      cursor:pointer;
      transition:transform .14s ease,background .14s ease,border-color .14s ease;
    }

    a.primary{
      color:#052012;
      border-color:transparent;
      background:linear-gradient(135deg,var(--green),#bbf7d0);
    }

    a.gold{
      color:#241a00;
      border-color:rgba(214,173,57,.32);
      background:linear-gradient(135deg,#d6ad39,var(--gold));
    }

    a:hover,button:hover{
      transform:translateY(-1px);
      border-color:rgba(16,37,28,.28);
      background:#fff;
    }

    a.primary:hover{
      color:#052012;
      border-color:transparent;
      background:linear-gradient(135deg,#2bd368,#c8f9d8);
    }

    a.gold:hover{
      color:#241a00;
      background:linear-gradient(135deg,#dfb94c,#f8d978);
    }

    a:active,button:active{transform:none}
    button:disabled{opacity:.55;cursor:not-allowed}

    #status{
      margin:14px 0 0;
      padding:11px 12px;
      border:1px solid rgba(214,173,57,.32);
      border-radius:14px;
      color:#6b4f00;
      background:rgba(244,207,100,.20);
      font-size:.88rem;
      font-weight:800;
      line-height:1.4;
    }

    #status.error{
      color:#991b1b;
      border-color:rgba(185,28,28,.28);
      background:rgba(254,226,226,.76);
    }

    #status[hidden]{display:none}

    @media(max-width:420px){
      body{padding:14px}
      main{padding:19px;border-radius:23px}
      h1{margin-bottom:18px}
      a,button{min-height:58px}
    }
  </style>
</head>
<body>
  <main>
    <h1>Bonjour commerçant.</h1>

    <nav aria-label="Actions commerçant">
      <a class="primary" href="./produits.html?v=market-audit-20260722-v1">Mes produits</a>
      <a href="./boutique.html?v=market-audit-20260722-v1">Ma boutique</a>
      <a class="gold" href="./qr.html?v=market-audit-20260722-v1">Mon QR boutique</a>
      <button id="shareWhatsApp" type="button">Partager sur WhatsApp</button>
    </nav>

    <p id="status" role="status" aria-live="polite" hidden></p>
  </main>

  <script>
    (() => {
      "use strict";

      const PUBLIC_ORIGIN = "https://market.digiylyfe.com";
      const shareButton = document.getElementById("shareWhatsApp");
      const statusBox = document.getElementById("status");
      const digits = value => String(value || "").replace(/\D/g, "");
      const cleanSlug = value => String(value || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "").replace(/-+/g, "-").replace(/^-|-$/g, "");
      const phoneLike = value => /\d{7,}/.test(cleanSlug(value));

      function setStatus(message, error){
        statusBox.textContent = message || "";
        statusBox.hidden = !message;
        statusBox.classList.toggle("error", !!error);
      }

      function extractSlug(value){
        let row = Array.isArray(value) ? value[0] : value;
        if(!row || typeof row !== "object") return "";
        row = row.data || row.profile || row.shop || row;
        return cleanSlug(row.slug || row.workspace_slug || row.shop_slug || row.public_slug || "");
      }

      async function resolvePublicSlug(){
        const guard = window.DIGIY_GUARD;
        if(!guard) return "";
        const session = await guard.ready();
        if(!guard.isAuthenticated() || !session?.access_ok) return "";
        let slug = cleanSlug(session.slug);
        const phone = digits(session.phone);
        const client = guard.getSb();
        if(client){
          const attempts = [];
          if(phone) attempts.push({p_phone:phone},{p_identity:phone});
          if(slug) attempts.push({p_slug:slug},{p_identity:slug});
          for(const args of attempts){
            try{
              const {data,error} = await client.rpc("digiy_market_resolve_identity", args);
              if(error || !data) continue;
              const found = extractSlug(data);
              if(found && !phoneLike(found)){ slug = found; break; }
            }catch(_){}
          }
        }
        return slug && !phoneLike(slug) ? slug : "";
      }

      shareButton.addEventListener("click", async () => {
        shareButton.disabled = true;
        setStatus("Préparation de ta fiche publique…", false);
        try{
          const slug = await resolvePublicSlug();
          if(!slug) throw new Error("slug_public_absent");
          const publicUrl = new URL("/fiche.html", PUBLIC_ORIGIN);
          publicUrl.searchParams.set("slug", slug);
          const message = "Bonjour, voici ma boutique DIGIY MARKET : " + publicUrl.toString();
          setStatus("Ouverture de WhatsApp…", false);
          window.location.href = "https://wa.me/?text=" + encodeURIComponent(message);
        }catch(error){
          setStatus("Aucune fiche publique propre n’est reliée à ce compte. Le partage général est bloqué pour éviter d’envoyer la mauvaise boutique.", true);
          console.error("[MARKET SHARE]", error);
        }finally{
          shareButton.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
