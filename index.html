<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#07140f"/>
  <meta name="description" content="Je vends — porte courte vers la gestion MARKET."/>
  <title>Je vends — Ouverture</title>

  <script>
    /*
      DIGIY MARKET — index court
      Rôle : ranger les anciens paramètres, nettoyer l'URL, ouvrir le cockpit.
      Pas de longue façade ici. Le vrai travail commence dans cockpit.html.
    */
    (function(){
      "use strict";

      window.DIGIY_MODULE = "MARKET";
      window.DIGIY_LOGIN_URL = "./pin.html";

      var qs = new URLSearchParams(location.search);

      function normSlug(v){
        return String(v || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g,"-")
          .replace(/[^a-z0-9-]/g,"")
          .replace(/-+/g,"-")
          .replace(/^-|-$/g,"");
      }

      function normPhone(v){
        var d = String(v || "").replace(/[^\d]/g,"");
        if (!d) return "";
        if (d.indexOf("221") === 0 && d.length === 12) return d;
        if (d.length === 9) return "221" + d;
        return d;
      }

      function storeBoth(key, value){
        if (!value) return;
        try{ sessionStorage.setItem(key, value); }catch(_){}
        try{ localStorage.setItem(key, value); }catch(_){}
      }

      var slug = normSlug(
        qs.get("slug") ||
        qs.get("market_slug") ||
        qs.get("subscription_slug") ||
        qs.get("pro_slug") ||
        ""
      );

      var phone = normPhone(
        qs.get("phone") ||
        qs.get("tel") ||
        qs.get("p_phone") ||
        qs.get("owner_phone") ||
        qs.get("checkout_phone") ||
        qs.get("subscription_phone") ||
        qs.get("market_phone") ||
        qs.get("msisdn") ||
        ""
      );

      if (slug){
        storeBoth("digiy_market_slug", slug);
        storeBoth("digiy_market_last_slug", slug);
        storeBoth("market_slug", slug);
        storeBoth("digiy_last_slug", slug);
      }

      if (phone){
        storeBoth("digiy_market_phone", phone);
        storeBoth("digiy_market_last_phone", phone);
        storeBoth("market_phone", phone);
        storeBoth("digiy_last_phone", phone);
        storeBoth("digiy_phone", phone);
      }

      try{
        if (location.search){
          history.replaceState({}, document.title, location.pathname + location.hash);
        }
      }catch(_){}

      window.__DIGIY_GO_COCKPIT__ = function(){
        location.replace("./cockpit.html");
      };

      window.__DIGIY_GO_PIN__ = function(){
        location.href = "./pin.html";
      };

      setTimeout(window.__DIGIY_GO_COCKPIT__, 90);
    })();
  </script>

  <style>
    :root{
      --bg:#07140f;
      --bg2:#040b08;
      --line:rgba(255,255,255,.12);
      --text:#ecfff4;
      --muted:rgba(236,255,244,.74);
      --gold:#facc15;
      --green:#22c55e;
      --green2:#16a34a;
      --shadow:0 24px 70px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:16px;
      background:
        radial-gradient(780px 420px at 10% -10%,rgba(34,197,94,.16),transparent 60%),
        radial-gradient(760px 420px at 110% 0%,rgba(250,204,21,.10),transparent 55%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    main{
      width:min(100%,560px);
      border:1px solid var(--line);
      border-radius:28px;
      background:rgba(255,255,255,.05);
      box-shadow:var(--shadow);
      padding:24px;
      display:grid;
      gap:14px;
      text-align:center;
    }

    .mark{
      width:66px;
      height:66px;
      margin:auto;
      border-radius:23px;
      display:grid;
      place-items:center;
      background:rgba(250,204,21,.12);
      border:1px solid rgba(250,204,21,.28);
      font-size:34px;
    }

    .eyebrow{
      color:var(--gold);
      font-size:13px;
      font-weight:1000;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      font-size:clamp(34px,9vw,52px);
      line-height:1.0;
      letter-spacing:-.05em;
      font-weight:1000;
    }

    p{
      margin:0;
      color:var(--muted);
      font-size:17px;
      font-weight:900;
      line-height:1.55;
    }

    .actions{
      display:grid;
      gap:10px;
      margin-top:4px;
    }

    a,button{
      min-height:58px;
      border-radius:18px;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      font-weight:1000;
      font-size:16px;
      color:var(--text);
      background:rgba(255,255,255,.07);
      font:inherit;
      cursor:pointer;
    }

    .primary{
      background:linear-gradient(135deg,var(--green),var(--green2));
      color:#041b12;
      border-color:transparent;
    }

    .gold{
      background:rgba(250,204,21,.12);
      color:#fff1a8;
      border-color:rgba(250,204,21,.25);
    }

    .foot{
      font-size:13px;
      color:rgba(236,255,244,.58);
      font-weight:900;
    }
  </style>
</head>

<body>
  <main>
    <div class="mark">🛍️</div>
    <div class="eyebrow">JE VENDS</div>

    <h1>Ouverture</h1>

    <p>
      Direction cockpit. Les anciens identifiants sont rangés dans le coffre et retirés de l’écran.
    </p>

    <div class="actions">
      <button class="primary" type="button" onclick="window.__DIGIY_GO_COCKPIT__ && window.__DIGIY_GO_COCKPIT__()">
        🧭 Ouvrir ma gestion
      </button>

      <button class="gold" type="button" onclick="window.__DIGIY_GO_PIN__ && window.__DIGIY_GO_PIN__()">
        🔑 Ouvrir mon accès
      </button>
    </div>

    <div class="foot">DIGIY MARKET • index court • cockpit d’abord</div>
  </main>
</body>
</html>
