<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>DIGIY MARKET PRO — Ma Carte</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#020617;
color:#F9FAFB;
font-family:system-ui;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.hero{
background:#0B1120;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.hero h1{
font-size:28px;
margin:0;
}

.form{
background:#0B1120;
padding:20px;
border-radius:20px;
display:grid;
gap:12px;
}

input,textarea{
padding:12px;
border-radius:12px;
border:1px solid #334155;
background:#020617;
color:white;
}

button{
padding:14px;
border-radius:999px;
border:none;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,#facc15,#f97316);
}

.preview{
margin-top:20px;
background:#0B1120;
border-radius:20px;
padding:20px;
}

.card{
border-radius:20px;
background:#111827;
padding:16px;
}

.card img{
width:100%;
border-radius:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>🏪 Poser ma carte sur DIGIY MARKET</h1>
<p>Ta boutique apparaîtra sur la place du marché de ta ville.</p>
</div>

<div class="form">

<input id="name" placeholder="Nom du commerce"/>
<input id="city" value="Saly"/>
<input id="category" placeholder="Catégorie"/>
<input id="photo" placeholder="URL photo"/>
<input id="whatsapp" placeholder="WhatsApp"/>
<textarea id="bio" placeholder="Description"></textarea>

<button onclick="previewCard()">👁️ Prévisualiser</button>
<button onclick="publish()">🚀 Publier ma carte</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

function previewCard(){

const name=document.getElementById("name").value
const city=document.getElementById("city").value
const cat=document.getElementById("category").value
const photo=document.getElementById("photo").value
const bio=document.getElementById("bio").value

document.getElementById("preview").innerHTML=`
<div class="card">
<img src="${photo}">
<h3>${name}</h3>
<p>${cat} • ${city}</p>
<p>${bio}</p>
</div>
`

}

</script>

</body>
</html>
