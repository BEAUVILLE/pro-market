<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DIGIY MARKET PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#061b14;
color:#eafff1;
font-family:system-ui;
padding:30px;
}

.card{
background:#0b2a1f;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #244d3d;
background:#041a13;
color:white;
}

button{
padding:10px 14px;
border-radius:8px;
border:0;
margin-right:8px;
cursor:pointer;
background:#facc15;
}

button.secondary{
background:#1f3d32;
color:white;
}

.log{
background:black;
padding:10px;
border-radius:8px;
font-size:12px;
white-space:pre-wrap;
min-height:120px;
}
</style>
</head>

<body>

<div class="card">

<h2>🦅 DIGIY MARKET PRO</h2>

<label>Téléphone</label>
<input id="phone" value="221771342889"/>

<label>Titre</label>
<input id="title" value="Bissap frais"/>

<label>Description</label>
<textarea id="description">Test agent worker — Saly</textarea>

<button id="btnEnqueue">🧠 Nettoyer</button>
<button id="btnApply" class="secondary" disabled>Créer draft</button>
<button id="btnPublish" class="secondary" disabled>Publier</button>

</div>


<div class="card">

<b>Job ID</b>
<div id="jobId">—</div>

<b>Listing ID</b>
<div id="listingId">—</div>

<b>Preview</b>
<div id="preview" class="log"></div>

<b>Logs</b>
<div id="logs" class="log"></div>

</div>


<script>

const SUPABASE_URL="https://wesqmwjjtsefyjnluosj.supabase.co"

const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)

const el=(id)=>document.getElementById(id)

const log=(t)=>{
el("logs").textContent=t+"\n"+el("logs").textContent
}

const state={
jobId:null,
listingId:null
}

function digits(s){
return String(s).replace(/\D/g,"")
}

async function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

async function waitJob(jobId){

while(true){

const {data,error}=await sb.rpc(
"digiy_agent_job_status",
{p_job_id:jobId}
)

if(error){
log("RPC error "+error.message)
await sleep(1000)
continue
}

if(!data?.ok){
await sleep(1000)
continue
}

log("status "+data.status)

if(data.status==="archived"){
return data.result
}

if(data.status==="dead"){
throw "job failed"
}

await sleep(1200)

}

}

async function enqueue(){

const phone=digits(el("phone").value)

const title=el("title").value
const description=el("description").value

log("enqueue agent")

const {data,error}=await sb.rpc(
"digiy_agent_enqueue",
{
p_module:"LOC",
p_agent_code:"MARKET_CATALOG_CLEAN",
p_payload:{title,description},
p_phone:phone,
p_slug:null,
p_run_at:new Date().toISOString(),
p_priority:"normal"
}
)

if(error){
log(error.message)
return
}

state.jobId=data.id

el("jobId").textContent=data.id

log("job créé")

const result=await waitJob(data.id)

log("résultat reçu")

el("preview").textContent=
JSON.stringify(result,null,2)

el("btnApply").disabled=false

}

async function apply(){

const phone=digits(el("phone").value)

const {data,error}=await sb.rpc(
"digiy_market_apply_agent_result",
{
p_job_id:state.jobId,
p_owner_phone:phone,
p_access_module:"LOC"
}
)

if(error){
log(error.message)
return
}

state.listingId=data.listing_id

el("listingId").textContent=data.listing_id

log("draft créé")

el("btnPublish").disabled=false

}

async function publish(){

const phone=digits(el("phone").value)

const {data,error}=await sb.rpc(
"digiy_market_publish_listing",
{
p_listing_id:state.listingId,
p_owner_phone:phone,
p_access_module:"LOC"
}
)

if(error){
log(error.message)
return
}

log("listing publié")

}

el("btnEnqueue").onclick=enqueue
el("btnApply").onclick=apply
el("btnPublish").onclick=publish

</script>

</body>
</html>
