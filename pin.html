<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>

  <meta name="theme-color" content="#020617"/>
  <meta name="robots" content="noindex,nofollow"/>

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"/>
  <script>
    window.DIGIY_SUPABASE_URL="https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY="sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#1e293b;--bg2:#334155;--line:rgba(148,163,184,.20);--ink:#f9fafb;--muted:#94a3b8;--gold:#facc15;--green:#22c55e;--red:#ef4444}
    *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:radial-gradient(ellipse 800px 500px at 15% -5%,rgba(250,204,21,.13),transparent 55%),radial-gradient(ellipse 700px 400px at 88% 5%,rgba(34,197,94,.10),transparent 55%),linear-gradient(180deg,var(--bg2),var(--bg))}
    .card{width:min(420px,100%);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:28px;padding:28px 24px 24px;box-shadow:0 28px 70px rgba(0,0,0,.55)}
    .header{text-align:center;margin-bottom:22px}.ico{font-size:38px;display:block;margin-bottom:10px}.badge{display:inline-flex;padding:5px 12px;border-radius:999px;border:1px solid rgba(250,204,21,.30);background:rgba(250,204,21,.08);color:#fde68a;font-size:11px;font-weight:950;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}.title{font-size:1.3rem;font-weight:1000}
    .panel{display:none}.panel.active{display:block}.label{display:block;font-size:.78rem;font-weight:950;color:var(--muted);margin-bottom:7px;text-transform:uppercase}.phone-wrap{position:relative}.phone-flag{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px}.input{width:100%;padding:14px 15px 14px 42px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--ink);font-size:1.05rem;font-weight:900;outline:none}.phone-recap{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-radius:12px;border:1px solid rgba(34,197,94,.25);background:rgba(34,197,94,.06);margin-bottom:18px}.phone-recap-num{font-weight:950;color:#86efac}.phone-recap-btn{border:0;background:none;color:var(--muted);font-weight:900;text-decoration:underline}
    .pin-dots{display:flex;justify-content:center;gap:16px;margin:8px 0 20px}.dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(148,163,184,.30)}.dot.filled{background:var(--gold);border-color:var(--gold)}.dot.err{border-color:var(--red);background:rgba(239,68,68,.2)}
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}.key{border:1px solid rgba(148,163,184,.18);border-radius:14px;background:rgba(255,255,255,.04);color:var(--ink);font-size:1.3rem;font-weight:1000;min-height:58px}.key.zero{grid-column:2}.key.del{font-size:1rem;color:var(--muted)}
    .btn{width:100%;min-height:52px;border-radius:16px;border:1px solid rgba(250,204,21,.35);background:linear-gradient(135deg,rgba(250,204,21,.22),rgba(34,197,94,.18));color:#fff;font-size:1rem;font-weight:1000}.btn:disabled,.key:disabled{opacity:.4}
    .status{display:none;margin-top:12px;padding:10px 13px;border-radius:12px;font-size:.84rem;font-weight:900;line-height:1.5;white-space:pre-wrap}.status.show{display:block}.status.err{background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.30);color:#fca5a5}.status.ok{background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.30);color:#86efac}.status.spin{background:rgba(148,163,184,.07);border:1px solid var(--line);color:var(--muted)}
    .note{margin-top:18px;text-align:center;color:rgba(148,163,184,.65);font-size:.74rem;font-weight:800;line-height:1.55}.version{margin-top:9px;text-align:center;color:rgba(148,163,184,.42);font-size:10px;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <header class="header"><span class="ico">🛍️</span><div class="badge">🔑 Accès DIGIY</div><div class="title">Je vends</div></header>
    <section class="panel active" id="step1">
      <label class="label" for="phoneInput">Ton numéro de téléphone</label>
      <div class="phone-wrap"><span class="phone-flag">🇸🇳</span><input id="phoneInput" class="input" type="tel" inputmode="numeric" placeholder="221 77 XXX XX XX" autocomplete="tel" maxlength="15"/></div>
      <div class="status" id="status1"></div>
      <button class="btn" id="btnContinue" type="button" style="margin-top:16px" disabled>Continuer →</button>
    </section>
    <section class="panel" id="step2">
      <div class="phone-recap"><span class="phone-recap-num" id="phoneDisplay"></span><button class="phone-recap-btn" id="btnBack" type="button">Modifier</button></div>
      <label class="label">Ton code secret (4 chiffres)</label>
      <div class="pin-dots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
      <div class="keypad" id="keypad">
        <button class="key" data-v="1" type="button">1</button><button class="key" data-v="2" type="button">2</button><button class="key" data-v="3" type="button">3</button>
        <button class="key" data-v="4" type="button">4</button><button class="key" data-v="5" type="button">5</button><button class="key" data-v="6" type="button">6</button>
        <button class="key" data-v="7" type="button">7</button><button class="key" data-v="8" type="button">8</button><button class="key" data-v="9" type="button">9</button>
        <button class="key zero" data-v="0" type="button">0</button><button class="key del" data-v="DEL" type="button">⌫</button>
      </div>
      <button class="btn" id="btnEnter" type="button" disabled>Entrer →</button>
      <div class="status" id="status2"></div>
    </section>
    <div class="note">Ton numéro et ton code ne sont jamais partagés.<br>DIGIY · 0% commission · 100% indépendance ∞</div>
    <div class="version">PIN MARKET v8 · porte canonique autonome</div>
  </main>
<script>
(()=>{
  "use strict";
  const MODULE="MARKET", MAX_AGE=8*60*60*1000;
  const MODULES=Array.from(new Set([
    "MARKET","MARKET_PRO","PRO_MARKET","DIGIY_MARKET","JE_VENDS","VENTE","SHOP","BOUTIQUE",
    "POS","POS_PRO","COMMERCE","CAISSE","MON_COMMERCE"
  ].flatMap(value=>[value,String(value).toLowerCase()])));
  const BUSINESS_RPCS=["digiy_market_verify_pin","digiy_pos_verify_pin"];
  const SESSION_KEYS=["DIGIY_MARKET_PIN_SESSION","DIGIY_MARKET_SESSION","DIGIY_SESSION_MARKET","DIGIY_PIN_SESSION","DIGIY_ACCESS","digiy_market_session","digiy_access","digiy_session"];
  const PHONE_KEYS=["digiy_market_phone","digiy_market_last_phone","market_phone","digiy_last_phone","digiy_phone"];
  const SLUG_KEYS=["digiy_market_slug","digiy_market_last_slug","market_slug","digiy_last_slug"];
  const FLAG_KEYS=["digiy_market_pin_access","digiy_market_access_ok","digiy_market_has_access","digiy_market_access"];
  const $=id=>document.getElementById(id), digits=v=>String(v||"").replace(/\D/g,"");
  let pin="",phone="",busy=false,sb=null;
  const truthy=v=>v===true||v===1||["true","t","1","ok","active","allowed","valid","verified","granted","yes"].includes(String(v||"").trim().toLowerCase());
  function variants(value){const d=digits(value),out=[];const add=v=>{v=digits(v);if(v&&!out.includes(v))out.push(v)};add(d);if(d.length===9)add("221"+d);if(d.length===12&&d.startsWith("221"))add(d.slice(3));if(d.length===10&&d.startsWith("0")){add(d.slice(1));add("221"+d.slice(1))}return out}
  function parse(data,fallback){let row=Array.isArray(data)?data[0]:data;if(truthy(row))return{ok:true,phone:fallback};if(typeof row==="string"){const text=row.trim();if(truthy(text))return{ok:true,phone:fallback};if(text.startsWith("(")&&text.endsWith(")")){const p=text.slice(1,-1).split(",");if(truthy(p[0]))return{ok:true,phone:digits(p[2]||fallback),slug:String(p[1]||"").trim(),token:String(p[3]||"").trim()}}try{row=JSON.parse(text)}catch(_){return null}}if(!row||typeof row!=="object")return null;if(row.data&&typeof row.data==="object")row=row.data;if(row.result&&typeof row.result==="object")row=row.result;const keys=["ok","success","valid","is_valid","verified","authenticated","allowed","access","access_ok","has_access","can_access","digiy_verify_pin"];if(!keys.some(k=>truthy(row[k]))&&!truthy(Object.values(row)[0]))return null;return{ok:true,phone:digits(row.phone||row.p_phone||row.owner_phone||fallback),slug:String(row.slug||row.identifiant||row.market_slug||row.pos_slug||row.workspace_slug||"").trim(),token:String(row.session_token||row.token||"").trim(),owner_id:row.owner_id||row.ownerId||null}}
  function parseAccess(data){let row=Array.isArray(data)?data[0]:data;if(truthy(row))return true;if(!row||typeof row!=="object")return false;if(Object.prototype.hasOwnProperty.call(row,"data"))return parseAccess(row.data);if(Object.prototype.hasOwnProperty.call(row,"result"))return parseAccess(row.result);return["ok","success","active","is_active","allowed","access","access_ok","has_access","can_access"].some(k=>truthy(row[k]))}
  function client(){if(sb)return sb;if(!window.supabase?.createClient)throw new Error("Librairie Supabase absente.");sb=window.supabase.createClient(window.DIGIY_SUPABASE_URL,window.DIGIY_SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false},global:{headers:{"x-digiy-module":MODULE}}});return sb}
  function store(key,value){for(const s of [sessionStorage,localStorage]){try{s.setItem(key,String(value))}catch(_){}}}
  function saveSession(result,acceptedPhone,acceptedModule,rail){const now=Date.now(),finalPhone=digits(result.phone||acceptedPhone),slug=String(result.slug||`market-${finalPhone}`).trim().toLowerCase(),until=now+MAX_AGE;const session={module:MODULE,pin_module:acceptedModule||MODULE,slug,phone:finalPhone,owner_id:result.owner_id||null,access:true,access_ok:true,ok:true,has_access:true,pin_access:true,verified:true,verified_at:now,validated_at:new Date(now).toISOString(),access_until:until,pin_access_until:until,expires_at:until,ts:now,session_token:result.token||"",verification_rail:rail||"generic",reason:"market_pin_canonical_v8"};const raw=JSON.stringify(session);SESSION_KEYS.forEach(k=>store(k,raw));PHONE_KEYS.forEach(k=>store(k,finalPhone));SLUG_KEYS.forEach(k=>store(k,slug));FLAG_KEYS.forEach(k=>store(k,"true"));store("digiy_market_pin_access_until",until);store("digiy_market_access_until",until);if(result.owner_id){store("digiy_market_owner_id",result.owner_id);store("DIGIY_PRO_ID",result.owner_id)}}
  async function tryBusinessRpc(c,p,code){let lastError=null;for(const rpcName of BUSINESS_RPCS){for(const payload of [{p_phone:p,p_pin:code},{phone:p,pin:code},{input_phone:p,input_pin:code}]){try{const{data,error}=await c.rpc(rpcName,payload);if(error){lastError=error;continue}const result=parse(data,p);if(result?.ok)return{ok:true,result,module:rpcName.includes("pos")?"POS":"MARKET",rail:rpcName}}catch(error){lastError=error}}}return{ok:false,lastError}}
  async function tryGeneric(c,p,code){let lastError=null,hadResponse=false;for(const moduleCode of MODULES){try{const{data,error}=await c.rpc("digiy_verify_pin",{p_phone:p,p_module:moduleCode,p_pin:code});if(error){lastError=error;continue}hadResponse=true;const result=parse(data,p);if(result?.ok)return{ok:true,result,module:moduleCode,rail:"digiy_verify_pin"}}catch(error){lastError=error}}return{ok:false,lastError,hadResponse}}
  async function findAccess(c,phones){let checked=false;for(const p of phones){for(const moduleCode of MODULES){try{const{data,error}=await c.rpc("digiy_has_access",{p_phone:p,p_module:moduleCode});if(error)continue;checked=true;if(parseAccess(data))return{found:true,checked,module:moduleCode}}catch(_){}}}return{found:false,checked,module:""}}
  function show(id,msg,kind){const el=$(id);el.textContent=msg;el.className="status show "+kind}function clear(id){const el=$(id);el.textContent="";el.className="status"}
  function update(){for(let i=0;i<4;i++){const d=$("d"+i);d.classList.toggle("filled",i<pin.length);d.classList.remove("err")}$("btnEnter").disabled=busy||pin.length!==4}
  function setBusy(v){busy=v;$("keypad").querySelectorAll("button").forEach(b=>b.disabled=v);update()}
  $("phoneInput").addEventListener("input",()=>{$("btnContinue").disabled=digits($("phoneInput").value).length<9;clear("status1")});
  $("btnContinue").addEventListener("click",()=>{phone=digits($("phoneInput").value);if(phone.length<9){show("status1","❌ Numéro trop court.","err");return}$("phoneDisplay").textContent=phone;$("step1").classList.remove("active");$("step2").classList.add("active");pin="";update()});
  $("btnBack").addEventListener("click",()=>{$("step2").classList.remove("active");$("step1").classList.add("active");pin="";setBusy(false);clear("status2")});
  $("keypad").addEventListener("click",e=>{if(busy)return;const b=e.target.closest("[data-v]");if(!b)return;const v=b.dataset.v;if(v==="DEL")pin=pin.slice(0,-1);else if(pin.length<4)pin+=v;clear("status2");update();if(pin.length===4)setTimeout(login,120)});$("btnEnter").addEventListener("click",login);
  async function login(){if(busy||pin.length!==4)return;setBusy(true);show("status2","⏳ Vérification sécurisée MARKET…","spin");let lastError=null,hadResponse=false;try{const c=client(),phones=variants(phone);for(const p of phones){const business=await tryBusinessRpc(c,p,pin);if(business.ok){saveSession(business.result,p,business.module,business.rail);show("status2","✅ Accès MARKET ouvert. Redirection…","ok");setTimeout(()=>location.replace("./cockpit.html"),450);return}lastError=business.lastError||lastError;const generic=await tryGeneric(c,p,pin);if(generic.ok){saveSession(generic.result,p,generic.module,generic.rail);show("status2","✅ Accès MARKET ouvert. Redirection…","ok");setTimeout(()=>location.replace("./cockpit.html"),450);return}lastError=generic.lastError||lastError;hadResponse=hadResponse||generic.hadResponse}const access=await findAccess(c,phones);pin="";setBusy(false);for(let i=0;i<4;i++)$("d"+i).classList.add("err");const message=access.found?"❌ Ton accès de vente existe, mais ce code ne correspond pas.\nVérifie les 4 chiffres et réessaie.":access.checked?"❌ Aucun accès MARKET / COMMERCE actif n’est relié à ce numéro.\nUtilise le numéro exact de l’inscription.":hadResponse?"❌ Numéro ou code de vente non reconnu.":"❌ "+String(lastError?.message||"Service PIN indisponible.");show("status2",message,"err")}catch(error){pin="";setBusy(false);show("status2","❌ "+String(error?.message||"Erreur de vérification."),"err")}}
})();
</script>
</body>
</html>
