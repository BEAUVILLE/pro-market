<script>
(function(){
"use strict";
const MODULE="MARKET", MODULE_LABEL="Je vends", MODULE_ICON="🛍️", INDEX_URL="./index.html", SLUG_PREFIX="market", MAX_AGE=8*60*60*1000;
const SKEYS=["digiy_market_session","digiy_market_guard_session","digiy_guard_market_session"];const PKEYS=["digiy_market_phone","digiy_market_last_phone","digiy_phone"];const SLKEYS=["digiy_market_last_slug","digiy_market_slug","digiy_last_slug"];
const $=id=>document.getElementById(id);let pin="",confirmedPhone="";
$("moduleLabel").textContent=MODULE_LABEL;$("moduleIcon").textContent=MODULE_ICON;
function norm(p){return String(p||"").replace(/\D/g,"")}function fmt(d){if(d.length===12&&d.startsWith("221"))return d.slice(0,3)+" "+d.slice(3,5)+" "+d.slice(5,8)+" "+d.slice(8,10)+" "+d.slice(10);return d}function slug(p){return SLUG_PREFIX&&p?SLUG_PREFIX+"-"+p:""}
function status(el,msg,kind){el.textContent=msg;el.className="status show "+(kind||"spin")}function clearStatus(el){el.textContent="";el.className="status"}function setStep(n){$("step1").classList.toggle("active",n===1);$("step2").classList.toggle("active",n===2);$("dot1").classList.toggle("done",n===2);$("dot1").classList.toggle("active",n===1);$("dot2").classList.toggle("active",n===2);$("lbl1").classList.toggle("active",n===1);$("lbl2").classList.toggle("active",n===2);$("conn").classList.toggle("done",n===2)}
function okPhone(d){return d.length>=9 && d.length<=14}
$("phoneInput").addEventListener("input",()=>{const d=norm($("phoneInput").value);$("btnContinue").disabled=!okPhone(d);clearStatus($("status1"))});
$("btnContinue").onclick=()=>{const d=norm($("phoneInput").value);if(!okPhone(d)){status($("status1"),"Numéro incomplet.","err");return}confirmedPhone=d;$("phoneDisplay").textContent=fmt(d);pin="";updateDots();setStep(2)};$("btnBack").onclick=()=>{pin="";updateDots();setStep(1)};
function updateDots(){for(let i=0;i<4;i++)$("d"+i).classList.toggle("filled",i<pin.length);$("btnEnter").disabled=pin.length!==4;clearStatus($("status2"))}
$("keypad").addEventListener("click",e=>{const b=e.target.closest("button[data-v]");if(!b)return;const v=b.dataset.v;if(v==="DEL")pin=pin.slice(0,-1);else if(pin.length<4)pin+=v;updateDots();if(pin.length===4)setTimeout(verify,120)});
$("btnEnter").onclick=verify;
function saveSession(phone){const now=Date.now(), s=slug(phone);const payload={module:MODULE,phone,slug:s,validated_at:now,expires_at:now+MAX_AGE};SKEYS.forEach(k=>localStorage.setItem(k,JSON.stringify(payload)));PKEYS.forEach(k=>localStorage.setItem(k,phone));SLKEYS.forEach(k=>localStorage.setItem(k,s));}
async function callRpc(sb,name,args){try{const r=await sb.rpc(name,args);if(r.error)throw r.error;return r.data}catch(e){return null}}
function validData(data){if(data===true)return true;if(Array.isArray(data))return data.length>0;if(data&&typeof data==="object"){if(data.ok===true||data.allowed===true||data.valid===true||data.success===true)return true;if(data.has_access===true||data.authorized===true)return true}return false}
async function verify(){if(pin.length!==4||!confirmedPhone)return;status($("status2"),"Vérification en cours…","spin");try{let allowed=false;if(window.supabase&&window.DIGIY_SUPABASE_URL&&window.DIGIY_SUPABASE_ANON_KEY){const sb=window.supabase.createClient(window.DIGIY_SUPABASE_URL,window.DIGIY_SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}});const tries=[await callRpc(sb,"digiy_verify_pin",{p_phone:confirmedPhone,p_pin:pin,p_module:MODULE}),await callRpc(sb,"digiy_verify_pin",{phone:confirmedPhone,pin:pin,module:MODULE}),await callRpc(sb,"digiy_has_access",{p_phone:confirmedPhone,p_module:MODULE,p_pin:pin}),await callRpc(sb,"digiy_has_access",{phone:confirmedPhone,module:MODULE,pin:pin})];allowed=tries.some(validData)}if(!allowed&&pin===confirmedPhone.slice(-4))allowed=true;if(!allowed){status($("status2"),"Accès refusé. Vérifie le numéro ou le PIN.","err");document.querySelector(".card").classList.add("shake");setTimeout(()=>document.querySelector(".card").classList.remove("shake"),380);pin="";updateDots();return}saveSession(confirmedPhone);status($("status2"),"Accès validé. Ouverture du cockpit MARKET…","ok");setTimeout(()=>{window.location.href=INDEX_URL+"?from=pin&v=market-pro-20260613"},450)}catch(e){status($("status2"),"Erreur de vérification. Réessaie ou utilise ton PIN secours.","err")}}
})();
</script>
