<script>
/* ═══════════════════════════════════════
   CONFIG & UTILITIES
═══════════════════════════════════════ */
const DEFAULT_CFG = {
  whatsapp: "221771342889",
  proUrl:   "https://commencer-a-payer.digiylyfe.com/",
  logoUrl:  ""
};

function readCatalog(){
  try {
    const raw = localStorage.getItem("digiy_market_catalog_v5");
    return raw ? JSON.parse(raw) : null;
  } catch(e) {
    return null;
  }
}

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function safe(str=""){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function normPhone(v){
  const d = String(v || "").replace(/[^\d]/g,"");
  if (!d) return "";
  if (d.startsWith("221") && d.length === 12) return d;
  if (d.length === 9) return "221" + d;
  return d;
}

function formatPhone(v){
  const p = normPhone(v);
  if (!p) return "—";
  if (p.length === 12 && p.startsWith("221")) {
    return `+221 ${p.slice(3,5)} ${p.slice(5,8)} ${p.slice(8,10)} ${p.slice(10,12)}`;
  }
  return p;
}

function parsePriceBase(price=""){
  const first = String(price).split(/[–-]/)[0] || "";
  const digits = first.replace(/[^\d]/g,"");
  return digits ? parseInt(digits,10) : null;
}

function makePrice(base,n){
  if(!base) return "Prix à définir";
  const v = Math.round((base*n)/1000)*1000;
  return `${v.toLocaleString("fr-FR").replace(/\s/g," ")} F`;
}

function splitOffer(what=""){
  return what.split(",").map(x=>x.trim()).filter(Boolean).slice(0,4);
}

function waLink(phone,text){
  return `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
}

function mapsUrl(query){
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
}

/* ─── SVG generators ─── */
function palette(bg){
  const map = {
    "#c8deff":["#bdd8ff","#8cb7ff"],
    "#ffe0cb":["#ffd9c5","#ffb88a"],
    "#ffeaaa":["#fff0b8","#ffd56d"],
    "#ffd0e0":["#ffd8e5","#ffb1cb"],
    "#eadfff":["#eee2ff","#d2beff"],
    "#dbfff6":["#ddfff5","#afe9d5"],
    "#f4ead7":["#f6ead9","#ddc9a3"],
    "#dbf5ea":["#dff7ec","#b8e0ca"]
  };
  return map[bg] || ["#f4ead7","#d8bf96"];
}

function makeSvgData(title,subtitle,icon,c1,c2){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/>
      </linearGradient>
      <filter id="f"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="rgba(0,0,0,.18)"/></filter>
    </defs>
    <rect width="1200" height="900" fill="url(#g)"/>
    <circle cx="1030" cy="120" r="160" fill="rgba(255,255,255,.12)"/>
    <circle cx="190"  cy="760" r="180" fill="rgba(255,255,255,.12)"/>
    <text x="100" y="230" font-size="190" filter="url(#f)">${icon}</text>
    <rect x="70" y="605" width="1060" height="180" rx="32" fill="rgba(255,255,255,.9)"/>
    <text x="120" y="680" font-family="Arial" font-size="60" font-weight="700" fill="#1a1208">${title}</text>
    <text x="120" y="740" font-family="Arial" font-size="30" fill="#6f624f">${subtitle}</text>
  </svg>`;
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
}

function makeMapSvg(title,subtitle){

    <rect width="1200" height="750" fill="#0e1a12"/>

}

function fallbackImg(v){
  const [c1,c2] = palette(v.bg || "#f4ead7");
  return makeSvgData(v.name, v.loc || v.city || "DIGIY MARKET", v.icon || "🛍️", c1, c2);
}

function buildGallery(v){
  const rawImages = Array.isArray(v.images) ? v.images.filter(Boolean) : [];
  if (rawImages.length) {
    const out = rawImages.map((src,i)=>({
      src,
      caption: i === 0 ? "Image principale" : `Vue ${i+1}`
    }));
    if (v.mapPreview) out.push({src:v.mapPreview, caption:"Repère carte"});
    return out.slice(0,8);
  }

  const [c1,c2] = palette(v.bg || "#f4ead7");
  const items = [
    {title:"Signature", sub:v.name,                      icon:v.icon || "🛍️"},
    {title:"Ambiance",  sub:v.loc || v.city || "terrain",icon:"✨"},
    {title:"Style",     sub:v.categoryLabel || "boutique",icon:v.categoryIcon || "🛍️"},
    {title:"Repère",    sub:"présence publique",         icon:"📍"},
    {title:"Éditorial", sub:"vitrine DIGIY",             icon:v.isRoyal ? "♛" : "🌍"}
  ];
  return items.map((item,i)=>({
    src: makeSvgData(item.title, item.sub, item.icon, i%2 ? c2 : c1, i%2 ? c1 : c2),
    caption: `${item.title} — visuel`
  }));
}

function buildExampleProducts(v){
  const base  = parsePriceBase(v.price);
  const parts = splitOffer(v.what);
  if(!parts.length) return [
    {title:"Produit exemple 1", desc:"À personnaliser.", price:"Prix à définir"},
    {title:"Produit exemple 2", desc:"À personnaliser.", price:"Prix à définir"},
    {title:"Produit exemple 3", desc:"À personnaliser.", price:"Prix à définir"},
    {title:"Produit exemple 4", desc:"À personnaliser.", price:"Prix à définir"}
  ];
  return parts.map((p,i)=>({
    title:p,
    desc:`Mise en avant pour ${v.name}.`,
    price:makePrice(base,0.35+(i*0.18))
  }));
}

function buildRealPublicBlocks(v){
  const rows = [];
  if (v.categoryLabel) rows.push({title:"Catégorie", desc:"Univers du commerçant.", price:v.categoryLabel});
  if (v.address)       rows.push({title:"Adresse",   desc:"Repère public.",         price:v.address});
  if (v.delivery_note) rows.push({title:"Livraison", desc:"Info publique utile.",    price:v.delivery_note});
  if (v.payment_note)  rows.push({title:"Paiement",  desc:"Mode de paiement.",       price:v.payment_note});
  if (v.owner_name)    rows.push({title:"Contact",   desc:"Nom public utile.",       price:v.owner_name});
  if (v.phone)         rows.push({title:"Téléphone", desc:"Numéro public.",          price:formatPhone(v.phone)});
  if (v.whatsapp)      rows.push({title:"WhatsApp",  desc:"Contact direct.",         price:formatPhone(v.whatsapp)});
  return rows.slice(0,6);
}

function applyTopBrand(cfg){
  if(cfg.logoUrl){
    document.getElementById("brandIcon").innerHTML = `<img src="${cfg.logoUrl}" alt="DIGIY">`;
  }
}

function makeSupabaseClient(){
  if(!window.supabase || !window.DIGIY_SUPABASE_URL) return null;
  return window.supabase.createClient(
    window.DIGIY_SUPABASE_URL,
    window.DIGIY_SUPABASE_ANON_KEY || window.DIGIY_SUPABASE_ANON,
    { auth:{ persistSession:false, autoRefreshToken:false, detectSessionInUrl:false } }
  );
}

async function loadPublicProfileBySlug(slug){
  const sb = makeSupabaseClient();
  if(!sb || !slug) return null;

  const { data, error } = await sb
    .from("digiy_market_public_profiles")
    .select("*")
    .eq("slug", slug)
    .maybeSingle();

  if(error || !data) return null;

  const cover   = data.cover_url || data.cover_image_url || data.photo_url || data.logo_url || "";
  const photo   = data.photo_url || data.logo_url || data.cover_url || data.cover_image_url || "";
  const gallery = [
    cover,
    photo,
    data.gallery_url_1,
    data.gallery_url_2,
    data.gallery_url_3,
    data.gallery_url_4
  ].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);

  return {
    mode: "real",
    slug: data.slug || slug,
    name: data.display_name || data.shop_name || data.business_name || "Boutique DIGIY",
    what: data.category || data.categories_text || "Boutique locale",
    loc: [data.city, data.address].filter(Boolean).join(" · ") || data.city || "Sénégal",
    city: data.city || "",
    address: data.address || "",
    categoryLabel: data.category || data.categories_text || "Boutique locale",
    categoryIcon: "🛍️",
    icon: "🛍️",
    price: "",
    live: data.is_published == null ? true : !!data.is_published,
    isExample: false,
    isRoyal: false,
    description: data.bio || data.description || "",
    whatsapp: normPhone(data.whatsapp || data.phone || ""),
    phone: normPhone(data.phone || ""),
    delivery_note: data.delivery_note || "",
    payment_note: data.payment_note || "",
    owner_name: data.owner_name || "",
    images: gallery,
    coverImage: cover || photo || "",
    raw: data
  };
}

  const mainImg = document.getElementById("galleryMainImage");
  const heroImg = document.getElementById("heroMainImage");
  const thumbs  = Array.from(document.querySelectorAll("#thumbRail .thumb"));

  thumbs.forEach(thumb=>{
    thumb.addEventListener("click", ()=>{
      thumbs.forEach(t=>t.classList.remove("active"));
      thumb.classList.add("active");
      const src = thumb.getAttribute("data-src");
      if (src && mainImg) mainImg.src = src;
      if (src && heroImg) heroImg.src = src;
    });
  });

  const io = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.style.animationPlayState = "running";
        io.unobserve(entry.target);
      }
    });
  },{threshold:.06});

  document.querySelectorAll(".anim").forEach(el=>{
    el.style.animationPlayState = "paused";
    io.observe(el);
  });

  const supportsHover = window.matchMedia("(hover:hover) and (pointer:fine)").matches;
  const heroWrap = document.getElementById("heroCoverWrap");

  if (supportsHover && heroWrap) {
    heroWrap.addEventListener("mousemove", e=>{
      const r = heroWrap.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      heroWrap.style.transform = `perspective(1200px) rotateY(${x*2.5}deg) rotateX(${-y*1.5}deg)`;
    });
    heroWrap.addEventListener("mouseleave", ()=>{
      heroWrap.style.transform = "";
    });
  }
}

        <h2 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:2rem;margin-bottom:10px">Fiche introuvable</h2>
        <p style="color:var(--muted);margin-bottom:24px">
          Ouvre une fiche depuis <strong style="color:var(--cream)">index.html</strong> ou charge une vraie boutique avec <strong style="color:var(--cream)">?slug=...</strong>
        </p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <a class="btn btn-fire" href="index.html">← Retour au marché</a>
          <a class="btn btn-ghost" href="${DEFAULT_CFG.proUrl}" target="_blank" rel="noopener">🔥 Je veux mon module</a>
        </div>
      </div>
    </div>
  `;
  document.getElementById("floatCtas").style.display = "none";
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
(async function boot(){
  const catalog     = readCatalog();
  const slug        = String(getParam("slug") || "").trim().toLowerCase();
  const exampleSlug = String(getParam("v") || "").trim();
  const cfg         = (catalog && catalog.config) ? { ...DEFAULT_CFG, ...catalog.config } : DEFAULT_CFG;

  applyTopBrand(cfg);

  if (slug) {
    const pub = await loadPublicProfileBySlug(slug);
    if (pub) {
      renderVendor(pub, cfg);
      return;
    }
  }

  if (catalog && Array.isArray(catalog.vendors) && exampleSlug) {
    const vendor = catalog.vendors.find(v => v.slug === exampleSlug);
    if (vendor) {
      renderVendor(vendor, cfg);
      return;
    }
  }

  renderMissing();
})();
</script>
