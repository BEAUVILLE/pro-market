<style>
:root{
  --bg:#fdf6ec;
  --card:#fffdf9;
  --ink:#1a1208;
  --muted:#7a6a54;
  --line:#e8d8be;
  --gold:#c8860a;
  --orange:#e86820;
  --red:#c83830;
  --green:#28885a;
  --shadow:0 18px 52px rgba(26,18,8,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(232,104,32,.06), transparent 28%),
    radial-gradient(circle at top right, rgba(40,136,90,.05), transparent 22%),
    var(--bg);
  color:var(--ink)
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{font:inherit}
.wrap{width:min(1180px,calc(100% - 28px));margin:0 auto}

.topbar{
  position:sticky;top:0;z-index:100;background:rgba(253,246,236,.93);
  backdrop-filter:blur(16px);border-bottom:2px solid var(--line)
}
.topbar-inner{
  min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:'Playfair Display',serif;font-weight:900;font-size:1.18rem
}
.brand-icon{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,#e86820,#c83830);
  display:grid;place-items:center;font-size:1.05rem;
  box-shadow:0 5px 16px rgba(232,104,32,.3);
  overflow:hidden;
}
.brand-icon img{width:100%;height:100%;object-fit:cover}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  border:none;cursor:pointer;border-radius:999px;padding:11px 15px;font-weight:900;transition:.18s ease
}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 10px 20px rgba(232,104,32,.22)}
.btn-primary:hover{background:var(--red)}
.btn-soft{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.btn-soft:hover{background:#fff3df}

.page{padding:24px 0 44px}
.hero{
  display:grid;grid-template-columns:1.06fr .94fr;gap:18px;align-items:stretch
}
.card{
  background:var(--card);border:1.5px solid var(--line);border-radius:28px;box-shadow:var(--shadow)
}
.cover-card{overflow:hidden}
.cover-media{position:relative;aspect-ratio:16/10;background:#f4ece0}
.cover-media img{width:100%;height:100%;object-fit:cover}
.cover-badges{
  position:absolute;left:16px;top:16px;display:flex;gap:8px;flex-wrap:wrap
}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 11px;border-radius:999px;font-size:.74rem;font-weight:900;letter-spacing:.04em
}
.badge.example{background:rgba(255,255,255,.95);border:1px solid rgba(232,104,32,.2);color:var(--orange)}
.badge.live{background:rgba(40,136,90,.92);color:#fff}
.badge.cat{background:rgba(26,18,8,.82);color:#fff}
.cover-foot{padding:18px 20px}
.cover-foot h1{
  font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.9rem,4vw,3.2rem);
  line-height:.95;margin-bottom:8px
}
.cover-foot p{color:var(--muted);line-height:1.7}

.info-card{padding:18px}
.kicker{
  display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;
  background:#fff;border:1.5px solid var(--line);font-size:.76rem;font-weight:900;color:var(--orange)
}
.info-lead{margin-top:12px;color:var(--muted);line-height:1.72}
.info-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px
}
.mini{
  background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px
}
.mini-label{
  font-size:.72rem;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px
}
.mini-value{font-weight:900;line-height:1.45}
.cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.note{
  margin-top:14px;padding:13px 14px;border-radius:18px;background:#fff8ed;border:1px solid #f6d7a3;
  color:#8d5a00;font-size:.86rem;line-height:1.65
}

.layout{
  display:grid;grid-template-columns:1fr 330px;gap:18px;margin-top:18px
}
.left-col,.right-col{display:grid;gap:18px}
.section-card{padding:18px}
.section-card h2{
  font-family:'Playfair Display',serif;font-size:1.34rem;font-weight:900;margin-bottom:12px
}
.section-card p{color:var(--muted);line-height:1.72}

.gallery-main{
  display:grid;grid-template-columns:1.12fr .88fr;gap:12px
}
.hero-photo{
  border-radius:24px;overflow:hidden;border:1px solid var(--line);background:#f4ece0
}
.hero-photo img{width:100%;height:100%;object-fit:cover;aspect-ratio:4/3}
.thumb-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px
}
.thumb{
  border-radius:20px;overflow:hidden;border:1px solid var(--line);background:#f4ece0
}
.thumb img{width:100%;aspect-ratio:1/1;object-fit:cover}
.thumb small{
  display:block;padding:8px 10px;background:#fff;font-weight:800;color:var(--muted)
}

.products{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px
}
.product{
  border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px
}
.product h3{font-size:1rem;margin-bottom:6px}
.product p{font-size:.88rem;line-height:1.6;margin-bottom:10px;color:var(--muted)}
.price{
  display:inline-flex;padding:6px 10px;border-radius:999px;background:#fef0d8;color:var(--gold);
  border:1px solid #f8d8a0;font-weight:900;font-size:.78rem
}

.side-list{display:grid;gap:10px}
.side-item{
  border:1px solid var(--line);border-radius:18px;background:#fff;padding:13px
}
.side-item .label{
  font-size:.72rem;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px
}
.side-item .value{font-weight:900;line-height:1.5}

.module-box{
  padding:18px;border-radius:22px;
  background:linear-gradient(135deg,#fff8ed,#fff1dd);
  border:1.5px solid #f0d0a0
}
.module-box h3{
  font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:8px
}
.module-box p{color:#7c5a12;line-height:1.65}
.module-box .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

.map-box{
  display:grid;gap:12px
}
.fake-map{
  border:1px solid var(--line);border-radius:20px;overflow:hidden;background:#f4ece0
}
.fake-map img{width:100%;aspect-ratio:16/10;object-fit:cover}
.map-actions{display:flex;gap:10px;flex-wrap:wrap}

.trust-box{
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px
}
.trust-list{
  display:grid;gap:10px
}
.trust-item{
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  background:#fffdf9
}
.trust-item strong{display:block;margin-bottom:4px}
.trust-item span{color:var(--muted);font-size:.86rem;line-height:1.55}

.empty-box{text-align:center;padding:32px 20px}
.empty-box h2{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:8px}
.empty-box p{color:var(--muted);line-height:1.7}

.float-cta{
  position:fixed;right:14px;bottom:14px;z-index:120;
  display:flex;flex-direction:column;gap:10px
}
.float-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  min-width:220px;padding:13px 16px;border-radius:999px;color:#fff;font-weight:900;
  box-shadow:0 16px 28px rgba(0,0,0,.18)
}
.float-btn.wa{background:#0b8f59}
.float-btn.module{background:linear-gradient(135deg,var(--orange),var(--red))}

@media(max-width:980px){
  .hero,.layout,.gallery-main{grid-template-columns:1fr}
}
@media(max-width:620px){
  .info-grid,.products,.thumb-grid{grid-template-columns:1fr}
  .topbar-inner{padding:10px 0}
  .float-cta{left:12px;right:12px}
  .float-btn{min-width:0;width:100%}
}
</style>

<body>

<script>
const DEFAULT_CFG = {
  whatsapp: "221771342889",
  proUrl: "https://commencer-a-payer.digiylyfe.com/",
  logoUrl: ""
};

function readCatalog(){
  try{
    const raw = localStorage.getItem("digiy_market_catalog_v5");
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){
    return null;
  }
}

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function safe(str=""){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function normPhone(v){
  const d = String(v || "").replace(/[^\d]/g, "");
  if (!d) return "";
  if (d.startsWith("221") && d.length === 12) return d;
  if (d.length === 9) return "221" + d;
  return d;
}

function parsePriceBase(price=""){
  const firstPart = String(price).split(/[–-]/)[0] || "";
  const digits = firstPart.replace(/[^\d]/g, "");
  if(!digits) return null;
  return parseInt(digits, 10);
}

function makePrice(base, n){
  if(!base) return "Prix à définir";
  const value = Math.round((base * n) / 1000) * 1000;
  return `${value.toLocaleString("fr-FR").replace(/\s/g," ")} F`;
}

function splitOffer(what=""){
  return what.split(",").map(x => x.trim()).filter(Boolean).slice(0,4);
}

function makeSvgData(title, subtitle, icon, c1, c2){
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${c1}"/>
        <stop offset="100%" stop-color="${c2}"/>
      </linearGradient>
      <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="rgba(0,0,0,.18)"/>
      </filter>
    </defs>
    <rect width="1200" height="900" fill="url(#g)"/>
    <circle cx="1030" cy="120" r="160" fill="rgba(255,255,255,.12)"/>
    <circle cx="190" cy="760" r="180" fill="rgba(255,255,255,.12)"/>
    <circle cx="860" cy="660" r="110" fill="rgba(255,255,255,.12)"/>
    <text x="100" y="230" font-size="190" filter="url(#f)">${icon}</text>
    <rect x="70" y="605" width="1060" height="180" rx="32" fill="rgba(255,255,255,.9)"/>
    <text x="120" y="680" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="#1a1208">${title}</text>
    <text x="120" y="740" font-family="Arial, sans-serif" font-size="30" fill="#6f624f">${subtitle}</text>
  </svg>`;
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
}

function makeMapSvg(title, subtitle){
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
    <rect width="1200" height="750" fill="#e9f1e7"/>
    <path d="M0 160 C240 120 340 240 560 200 C740 170 870 70 1200 120" stroke="#c6d8c2" stroke-width="90" fill="none"/>
    <path d="M-20 500 C180 430 360 560 620 510 C840 470 1000 310 1220 360" stroke="#d7cbb5" stroke-width="80" fill="none"/>
    <path d="M200 0 L260 750" stroke="#fff" stroke-width="18" opacity=".7"/>
    <path d="M760 0 L700 750" stroke="#fff" stroke-width="18" opacity=".7"/>
    <circle cx="610" cy="360" r="34" fill="#e86820"/>
    <path d="M610 410 C650 470 710 520 610 630 C510 520 570 470 610 410 Z" fill="#c83830"/>
    <circle cx="610" cy="360" r="15" fill="#fff"/>
    <rect x="70" y="540" width="1060" height="140" rx="28" fill="rgba(255,255,255,.92)"/>
    <text x="110" y="605" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#1a1208">${title}</text>
    <text x="110" y="646" font-family="Arial, sans-serif" font-size="26" fill="#6f624f">${subtitle}</text>
  </svg>`;
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
}

function palette(bg){
  const map = {
    "#c8deff":["#bdd8ff","#8cb7ff"],
    "#ffe0cb":["#ffd9c5","#ffb88a"],
    "#ffeaaa":["#fff0b8","#ffd56d"],
    "#ffd0e0":["#ffd8e5","#ffb1cb"],
    "#eadfff":["#eee2ff","#d2beff"],
    "#dbfff6":["#ddfff5","#afe9d5"],
    "#f4ead7":["#f6ead9","#ddc9a3"],
    "#dbf5ea":["#dff7ec","#b8e0ca"]
  };
  return map[bg] || ["#f4ead7","#d8bf96"];
}

function fallbackVendorImage(v){
  const [c1,c2] = palette(v.bg || "#f4ead7");
  return makeSvgData(v.name, v.loc || v.city || "DIGIY MARKET", v.icon || "🛍️", c1, c2);
}

function buildGallery(v){
  if(Array.isArray(v.images) && v.images.length){
    return v.images.map((src, i) => ({
      src,
      caption: i === 0 ? "Photo principale" : `Photo ${i + 1}`
    }));
  }

  const [c1,c2] = palette(v.bg || "#f4ead7");
  const items = [
    {title:"Vitrine", sub:`${v.name} · accueil`, icon:v.icon || "🛍️"},
    {title:"Ambiance", sub:v.loc || v.city || "terrain", icon:"✨"},
    {title:"Lecture", sub:v.categoryLabel || "boutique", icon:v.categoryIcon || "🛍️"},
    {title:"Repère", sub:"présence publique", icon:"📍"},
    {title:"Style", sub:"présentation soignée", icon:"🌟"}
  ];

  return items.map((item, i) => ({
    src: makeSvgData(item.title, item.sub, item.icon, i % 2 ? c2 : c1, i % 2 ? c1 : c2),
    caption: `${item.title} — visuel`
  }));
}

function buildExampleProducts(v){
  const base = parsePriceBase(v.price);
  const parts = splitOffer(v.what);
  if(!parts.length){
    return [
      {title:"Produit exemple 1", desc:"À personnaliser plus tard.", price:"Prix à définir"},
      {title:"Produit exemple 2", desc:"À personnaliser plus tard.", price:"Prix à définir"},
      {title:"Produit exemple 3", desc:"À personnaliser plus tard.", price:"Prix à définir"},
      {title:"Produit exemple 4", desc:"À personnaliser plus tard.", price:"Prix à définir"}
    ];
  }
  return parts.map((part, i) => ({
    title: part,
    desc: `Exemple de mise en avant pour ${v.name}.`,
    price: makePrice(base, 0.35 + (i * 0.18))
  }));
}

function buildRealPublicBlocks(v){
  const rows = [];

  if (v.categoryLabel) {
    rows.push({
      title: "Catégorie",
      desc: "Lecture publique visible sur la fiche.",
      price: v.categoryLabel
    });
  }

  if (v.city) {
    rows.push({
      title: "Ville",
      desc: "Repère terrain du commerçant.",
      price: v.city
    });
  }

  if (v.delivery_note) {
    rows.push({
      title: "Livraison",
      desc: "Information publique utile.",
      price: v.delivery_note
    });
  }

  if (v.payment_note) {
    rows.push({
      title: "Paiement",
      desc: "Mode ou repère de paiement communiqué.",
      price: v.payment_note
    });
  }

  return rows.slice(0,4);
}

function waLink(phone, text){
  return `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
}

function mapsSearchUrl(query){
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
}

function applyTopBrand(cfg){
  if(cfg.logoUrl){
    document.getElementById("brandIcon").innerHTML = `<img src="${cfg.logoUrl}" alt="DIGIY">`;
  }
}

function makeSupabaseClient(){
  if (!window.supabase || !window.DIGIY_SUPABASE_URL || !(window.DIGIY_SUPABASE_ANON_KEY || window.DIGIY_SUPABASE_ANON)) {
    return null;
  }

  return window.supabase.createClient(
    window.DIGIY_SUPABASE_URL,
    window.DIGIY_SUPABASE_ANON_KEY || window.DIGIY_SUPABASE_ANON,
    {
      auth:{
        persistSession:false,
        autoRefreshToken:false,
        detectSessionInUrl:false
      }
    }
  );
}

async function loadPublicProfileBySlug(slug){
  const sb = makeSupabaseClient();
  if (!sb || !slug) return null;

  const { data, error } = await sb
    .from("digiy_market_public_profiles")
    .select("*")
    .eq("slug", slug)
    .maybeSingle();

  if (error) {
    console.error("public profile load error:", error);
    return null;
  }

  if (!data) return null;

  const cover =
    data.cover_url ||
    data.cover_image_url ||
    data.photo_url ||
    data.logo_url ||
    "";

  const photo =
    data.photo_url ||
    data.logo_url ||
    data.cover_url ||
    data.cover_image_url ||
    "";

  const images = [cover, photo].filter(Boolean).filter((v, i, arr) => arr.indexOf(v) === i);

  return {
    mode: "real",
    slug: data.slug || slug,
    name: data.display_name || data.shop_name || data.business_name || "Boutique DIGIY",
    what: data.category || data.categories_text || "Boutique locale",
    loc: [data.city, data.address].filter(Boolean).join(" · ") || data.city || "Sénégal",
    city: data.city || "",
    address: data.address || "",
    categoryLabel: data.category || data.categories_text || "Boutique locale",
    categoryIcon: "🛍️",
    icon: "🛍️",
    price: "",
    live: data.is_published == null ? true : !!data.is_published,
    isExample: false,
    description: data.bio || data.description || "",
    whatsapp: normPhone(data.whatsapp || data.phone || ""),
    phone: normPhone(data.phone || ""),
    delivery_note: data.delivery_note || "",
    payment_note: data.payment_note || "",
    owner_name: data.owner_name || "",
    images,
    coverImage: cover || photo || "",
    raw: data
  };
}

function renderVendor(v, cfg){
  const app = document.getElementById("app");
  const gallery = buildGallery(v);
  const isExample = !!v.isExample;
  const realPublicBlocks = !isExample ? buildRealPublicBlocks(v) : [];
  const exampleProducts = isExample ? buildExampleProducts(v) : [];
  const blocks = isExample ? exampleProducts : realPublicBlocks;

  document.title = `${v.name} — DIGIY MARKET`;

  const waGeneral = waLink(cfg.whatsapp, `Bonjour DIGIY 👋 Je veux une vitrine comme "${v.name}" sur DIGIY MARKET.`);
  const waBoutique = v.whatsapp ? waLink(v.whatsapp, `Bonjour 👋 Je vous contacte depuis votre fiche DIGIY MARKET.`) : "";
  const waMain = isExample ? waGeneral : (waBoutique || waGeneral);
  const waMainLabel = isExample ? "💬 WhatsApp DIGIY" : (waBoutique ? "💬 WhatsApp boutique" : "💬 WhatsApp DIGIY");

  const mapsQuery = [v.name, v.address || "", v.city || "", v.loc || ""].filter(Boolean).join(" ");
  const mapsUrl = mapsSearchUrl(mapsQuery || v.name);
  const mapImg = makeMapSvg(v.name, v.loc || v.city || "Sénégal");

  document.getElementById("topWaBtn").href = waMain;
  document.getElementById("topWaBtn").textContent = waMainLabel;
  document.getElementById("topModuleBtn").href = cfg.proUrl || DEFAULT_CFG.proUrl;

  document.getElementById("floatWaBtn").href = waMain;
  document.getElementById("floatWaBtn").textContent = waMainLabel;
  document.getElementById("floatModuleBtn").href = cfg.proUrl || DEFAULT_CFG.proUrl;
  document.getElementById("floatCtas").style.display = "flex";

  applyTopBrand(cfg);

  const heroText = isExample
    ? v.what
    : (v.description || "Fiche publique DIGIY MARKET.");

  const sideNote = isExample
    ? `Tous les boutons contact renvoient vers ton WhatsApp DIGIY. Le bouton module renvoie vers ton entrée PRO officielle.`
    : `Cette fiche publique lit le profil réel par slug. Le contact renvoie vers la boutique si le numéro public est disponible.`;

  const sectionTitle = isExample ? "Produits / services mis en avant" : "Lecture publique";
  const sectionLead = isExample
    ? `Tu peux montrer ici les meilleurs produits, les prix d’appel, les services phares ou les spécialités du commerçant.`
    : `Cette zone montre les repères publics visibles sans inventer un faux catalogue.`;

  const sectionContent = blocks.length
    ? `
      <div class="products" style="margin-top:14px">
        ${blocks.map(p => `
          <div class="product">
            <h3>${safe(p.title)}</h3>
            <p>${safe(p.desc)}</p>
            <span class="price">${safe(p.price)}</span>
          </div>
        `).join("")}
      </div>
    `
    : `
      <div class="empty-box" style="margin-top:14px;border:1px dashed var(--line);border-radius:22px;background:#fff">
        <h2 style="font-size:1.28rem">Catalogue public à brancher</h2>
        <p>La fiche publique est bien visible, mais le catalogue détaillé n’est pas encore exposé ici.</p>
      </div>
    `;

  app.innerHTML = `
    <section class="hero">
      <article class="cover-card card">
        <div class="cover-media">
          <img src="${gallery[0]?.src || v.coverImage || fallbackVendorImage(v)}" alt="${safe(v.name)}">
          <div class="cover-badges">
            ${
              isExample
                ? `<span class="badge example">EXEMPLE DIGIY</span>`
                : `<span class="badge live">BOUTIQUE PUBLIQUE</span>`
            }
            ${
              isExample && v.live
                ? `<span class="badge live">EXEMPLE VISIBLE</span>`
                : ``
            }
            <span class="badge cat">${safe(v.categoryIcon || "🛍️")} ${safe(v.categoryLabel || "Boutique")}</span>
          </div>
        </div>
        <div class="cover-foot">
          <h1>${safe(v.name)}</h1>
          <p>${safe(heroText)}</p>
        </div>
      </article>

      <aside class="info-card card">
        <div class="kicker">
          ${isExample ? "🧭 Vitrine exemple guidante" : "🌍 Fiche publique réelle"}
        </div>
        <p class="info-lead">
          ${
            isExample
              ? `Cette fiche montre le niveau possible pour une boutique DIGIY MARKET : galerie, vitrine, contact WhatsApp, présence Maps et ouverture vers le module PRO.`
              : `Cette fiche publique lit le profil réel du commerçant sur le rail slug-first, sans passer par une session PRO.`
          }
        </p>

        <div class="info-grid">
          <div class="mini">
            <div class="mini-label">Catégorie</div>
            <div class="mini-value">${safe(v.categoryLabel || "Boutique locale")}</div>
          </div>
          <div class="mini">
            <div class="mini-label">Zone</div>
            <div class="mini-value">${safe(v.loc || "Sénégal")}</div>
          </div>
          <div class="mini">
            <div class="mini-label">Type</div>
            <div class="mini-value">${isExample ? "Vitrine exemple DIGIY" : "Boutique publique réelle"}</div>
          </div>
          <div class="mini">
            <div class="mini-label">Statut</div>
            <div class="mini-value">${isExample ? (v.live ? "Exemple visible" : "Vitrine exemple") : "Lecture publique"}</div>
          </div>
        </div>

        <div class="cta-row">
          <a class="btn btn-primary" href="${waMain}" target="_blank" rel="noopener">${waMainLabel}</a>
          <a class="btn btn-primary" style="background:linear-gradient(135deg,var(--orange),var(--red))" href="${cfg.proUrl || DEFAULT_CFG.proUrl}" target="_blank" rel="noopener">🔥 Je veux mon module</a>
          <a class="btn btn-soft" href="${mapsUrl}" target="_blank" rel="noopener">📍 Voir sur Maps</a>
          <a class="btn btn-soft" href="index.html">← Retour au marché</a>
        </div>

        <div class="note">
          ${safe(sideNote)}
        </div>
      </aside>
    </section>

    <section class="layout">
      <div class="left-col">
        <article class="section-card card">
          <h2>${isExample ? "Belle galerie de présentation" : "Galerie publique"}</h2>
          <p>
            ${
              isExample
                ? `Cette galerie sert à montrer comment un commerçant peut exposer sa boutique, ses produits et son ambiance visuelle.`
                : `Cette galerie sert à poser une présence publique claire autour de la boutique.`
            }
          </p>

          <div class="gallery-main" style="margin-top:14px">
            <figure class="hero-photo">
              <img src="${gallery[0]?.src || v.coverImage || fallbackVendorImage(v)}" alt="${safe(gallery[0]?.caption || "Photo principale")}">
            </figure>

            <div class="thumb-grid">
              ${gallery.slice(1,5).map(g => `
                <figure class="thumb">
                  <img src="${g.src}" alt="${safe(g.caption)}">
                  <small>${safe(g.caption)}</small>
                </figure>
              `).join("")}
            </div>
          </div>
        </article>

        <article class="section-card card">
          <h2>${sectionTitle}</h2>
          <p>${sectionLead}</p>
          ${sectionContent}
        </article>

        <article class="section-card card">
          <h2>Présence terrain & Maps</h2>
          <p>
            Ce bloc sert à montrer que la fiche peut aussi guider vers une présence locale,
            avec une sortie simple vers Maps et le contact utile.
          </p>

          <div class="map-box" style="margin-top:14px">
            <figure class="fake-map">
              <img src="${mapImg}" alt="Carte de ${safe(v.name)}">
            </figure>
            <div class="map-actions">
              <a class="btn btn-soft" href="${mapsUrl}" target="_blank" rel="noopener">📍 Ouvrir sur Google Maps</a>
              <a class="btn btn-primary" href="${waMain}" target="_blank" rel="noopener">${waMainLabel}</a>
            </div>
          </div>
        </article>

        <article class="section-card card">
          <h2>${isExample ? "Pourquoi cette fiche frappe fort" : "Pourquoi cette fiche est propre"}</h2>
          <p>
            ${
              isExample
                ? `Parce qu’elle montre une présence complète : visuel, catégorie, zone, galerie, contact, Maps, et ouverture PRO.`
                : `Parce qu’elle sépare bien le public du PRO : lecture publique par slug, sans mélanger la session vendeur.`
            }
          </p>
        </article>
      </div>

      <aside class="right-col">
        <article class="section-card card">
          <h2>Repères rapides</h2>
          <div class="side-list">
            <div class="side-item">
              <div class="label">Nom</div>
              <div class="value">${safe(v.name)}</div>
            </div>
            <div class="side-item">
              <div class="label">Activité</div>
              <div class="value">${safe(v.what || "Boutique locale")}</div>
            </div>
            <div class="side-item">
              <div class="label">Ville / zone</div>
              <div class="value">${safe(v.loc || "Sénégal")}</div>
            </div>
            <div class="side-item">
              <div class="label">Univers</div>
              <div class="value">${safe(v.categoryLabel || "Boutique locale")}</div>
            </div>
            <div class="side-item">
              <div class="label">Slug</div>
              <div class="value">${safe(v.slug || "—")}</div>
            </div>
            <div class="side-item">
              <div class="label">Type</div>
              <div class="value">${isExample ? "Vitrine exemple DIGIY" : "Boutique publique réelle"}</div>
            </div>
          </div>
        </article>

        <article class="module-box">
          <h3>🔥 Je veux mon module</h3>
          <p>
            Cette fiche sert aussi de porte d’entrée commerciale. La vitrine vue ici peut devenir la tienne.
          </p>
          <div class="row">
            <a class="btn btn-primary" href="${cfg.proUrl || DEFAULT_CFG.proUrl}" target="_blank" rel="noopener">Je veux mon module</a>
            <a class="btn btn-soft" href="${waGeneral}" target="_blank" rel="noopener">WhatsApp DIGIY</a>
          </div>
        </article>

        <article class="trust-box">
          <h2 style="font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:10px;">Ils nous font confiance</h2>
          <div class="trust-list">
            <div class="trust-item">
              <strong>Vendeurs terrain</strong>
              <span>Présence simple, forte, visible et humaine.</span>
            </div>
            <div class="trust-item">
              <strong>Beauté & service</strong>
              <span>Coiffure, onglerie, soin, tout peut vivre ici.</span>
            </div>
            <div class="trust-item">
              <strong>Commerçants du quotidien</strong>
              <span>De la maison au textile, chacun peut respirer.</span>
            </div>
          </div>
        </article>

        <article class="section-card card">
          <h2>Ce que tu peux brancher ensuite</h2>
          <div class="side-list">
            <div class="side-item"><div class="value">📸 Galerie réelle du commerçant</div></div>
            <div class="side-item"><div class="value">📍 Lien Google Maps réel</div></div>
            <div class="side-item"><div class="value">💬 WhatsApp direct commerçant</div></div>
            <div class="side-item"><div class="value">📞 Appel téléphone</div></div>
            <div class="side-item"><div class="value">💳 DIGIY PAY</div></div>
            <div class="side-item"><div class="value">🏪 Passage vers MARKET PRO</div></div>
          </div>
        </article>
      </aside>
    </section>
  `;
}

function renderMissing(){
  document.getElementById("app").innerHTML = `
    <div class="empty-box card">
      <h2>Fiche introuvable</h2>
      <p>Ouvre une fiche exemple depuis <strong>index.html?v=...</strong> ou charge une vraie fiche avec <strong>?slug=...</strong>.</p>
      <div style="margin-top:16px">
        <a class="btn btn-primary" href="index.html">Retour au marché</a>
      </div>
    </div>
  `;
}

(async function boot(){
  const catalog = readCatalog();
  const slug = String(getParam("slug") || "").trim().toLowerCase();
  const exampleSlug = String(getParam("v") || "").trim();

  const cfg = (catalog && catalog.config) ? { ...DEFAULT_CFG, ...catalog.config } : DEFAULT_CFG;
  applyTopBrand(cfg);

  if (slug) {
    const publicVendor = await loadPublicProfileBySlug(slug);
    if (publicVendor) {
      renderVendor(publicVendor, cfg);
      return;
    }
  }

  if (catalog && Array.isArray(catalog.vendors) && exampleSlug) {
    const vendor = catalog.vendors.find(v => v.slug === exampleSlug);
    if (vendor) {
      renderVendor(vendor, cfg);
      return;
    }
  }

  renderMissing();
})();
</script>
</body>
</html>
