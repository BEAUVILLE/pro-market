<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#07140f"/>
  <meta name="description" content="Ancienne entrée MARKET redirigée vers la gestion cockpit."/>
  <title>Je vends — Redirection</title>

  <script>
    (function(){
      "use strict";

      window.DIGIY_MODULE = "MARKET";
      window.DIGIY_LOGIN_URL = "./pin.html";

      var qs = new URLSearchParams(location.search);

      function normSlug(v){
        return String(v || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g,"-")
          .replace(/[^a-z0-9-]/g,"")
          .replace(/-+/g,"-")
          .replace(/^-|-$/g,"");
      }

      function normPhone(v){
        var d = String(v || "").replace(/[^\d]/g,"");
        if (!d) return "";
        if (d.indexOf("221") === 0 && d.length === 12) return d;
        if (d.length === 9) return "221" + d;
        return d;
      }

      function storeBoth(key,value){
        if (!value) return;
        try{ sessionStorage.setItem(key,value); }catch(_){}
        try{ localStorage.setItem(key,value); }catch(_){}
      }

      var slug = normSlug(
        qs.get("slug") ||
        qs.get("market_slug") ||
        qs.get("subscription_slug") ||
        qs.get("pro_slug") ||
        ""
      );

      var phone = normPhone(
        qs.get("phone") ||
        qs.get("tel") ||
        qs.get("owner_phone") ||
        qs.get("checkout_phone") ||
        qs.get("subscription_phone") ||
        qs.get("market_phone") ||
        ""
      );

      if (slug){
        storeBoth("digiy_market_slug", slug);
        storeBoth("digiy_market_last_slug", slug);
        storeBoth("market_slug", slug);
        storeBoth("digiy_last_slug", slug);
      }

      if (phone){
        storeBoth("digiy_market_phone", phone);
        storeBoth("digiy_market_last_phone", phone);
        storeBoth("market_phone", phone);
        storeBoth("digiy_last_phone", phone);
        storeBoth("digiy_phone", phone);
      }

      try{
        if (location.search){
          history.replaceState({}, document.title, location.pathname + location.hash);
        }
      }catch(_){}

      window.__DIGIY_GO_COCKPIT__ = function(){
        location.replace("./cockpit.html");
      };

      setTimeout(window.__DIGIY_GO_COCKPIT__, 120);
    })();
  </script>

  <style>
    :root{
      --bg:#07140f;
      --bg2:#040b08;
      --line:rgba(255,255,255,.12);
      --text:#ecfff4;
      --muted:rgba(236,255,244,.72);
      --gold:#facc15;
      --green:#22c55e;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:20px;
      background:
        radial-gradient(780px 420px at 10% -10%,rgba(34,197,94,.16),transparent 60%),
        radial-gradient(760px 420px at 110% 0%,rgba(250,204,21,.10),transparent 55%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    main{
      width:min(100%,560px);
      border:1px solid var(--line);
      border-radius:26px;
      background:rgba(255,255,255,.045);
      box-shadow:0 24px 70px rgba(0,0,0,.36);
      padding:24px;
      display:grid;
      gap:14px;
      text-align:center;
    }

    .mark{
      width:58px;
      height:58px;
      margin:auto;
      border-radius:20px;
      display:grid;
      place-items:center;
      background:rgba(250,204,21,.12);
      border:1px solid rgba(250,204,21,.26);
      font-size:28px;
    }

    .eyebrow{
      color:var(--gold);
      font-size:12px;
      font-weight:950;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      font-size:clamp(28px,8vw,42px);
      line-height:1.04;
      letter-spacing:-.03em;
    }

    p{
      margin:0;
      color:var(--muted);
      font-weight:800;
      line-height:1.55;
    }

    .actions{
      display:grid;
      gap:10px;
      margin-top:4px;
    }

    a,button{
      min-height:52px;
      border-radius:16px;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      font-weight:950;
      color:var(--text);
      background:rgba(255,255,255,.06);
      font:inherit;
      cursor:pointer;
    }

    .primary{
      background:linear-gradient(135deg,var(--green),#16a34a);
      color:#041b12;
      border-color:transparent;
    }

    .gold{
      background:rgba(250,204,21,.12);
      color:#fff1a8;
      border-color:rgba(250,204,21,.25);
    }

    .foot{
      font-size:12px;
      color:rgba(236,255,244,.56);
      font-weight:800;
    }
  </style>
</head>

<body>
  <main>
    <div class="mark">🛍️</div>
    <div class="eyebrow">JE VENDS</div>

    <h1>Redirection vers ta gestion</h1>

    <p>
      Cette ancienne entrée MARKET est rangée.
      Le chemin propre passe maintenant par le cockpit.
    </p>

    <div class="actions">
      <button class="primary" type="button" onclick="window.__DIGIY_GO_COCKPIT__ && window.__DIGIY_GO_COCKPIT__()">
        🏠 Ouvrir ma gestion
      </button>

      <a class="gold" href="./pin.html">
        🔑 Ouvrir mon accès
      </a>
    </div>

    <div class="foot">DIGIY MARKET • ancienne entrée neutralisée • cockpit d’abord</div>
  </main>
</body>
</html>
